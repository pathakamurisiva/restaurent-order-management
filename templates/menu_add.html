{% extends "base.html" %}

{% block title %}Add Menu Item - Restaurant Order Management{% endblock %}

{% block content %}
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h1 class="h3 mb-0">Add Menu Item</h1>
    <a class="btn btn-outline-secondary" href="{{ url_for('menu') }}">Back to Menu</a>
  </div>

  <div class="card">
    <div class="card-body">
      <form method="post">
        <div class="mb-3">
          <label class="form-label" for="name">Name</label>
          <input id="name" name="name" type="text" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label" for="category_id">Category</label>
          <select id="category_id" name="category_id" class="form-select" required>
            <option value="" selected disabled>Select category</option>
            {% for c in categories %}
              <option value="{{ c.id }}">{{ c.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label" for="price">Price</label>
          <input id="price" name="price" type="number" step="0.01" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label" for="description">Description</label>
          <textarea id="description" name="description" class="form-control" rows="3"></textarea>
        </div>
        <div class="form-check mb-3">
          <input id="is_available" name="is_available" class="form-check-input" type="checkbox" checked />
          <label class="form-check-label" for="is_available">Available</label>
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
      </form>
    </div>
  </div>
{% endblock %}
